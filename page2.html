<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloons - Birthday Surprise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-2">
        <div class="balloons-container">
            <div class="balloon balloon-1" onclick="showMessage(1)">
                <div class="balloon-text">💗</div>
            </div>
            <div class="balloon balloon-2" onclick="showMessage(2)">
                <div class="balloon-text">🎈</div>
            </div>
            <div class="balloon balloon-3" onclick="showMessage(3)">
                <div class="balloon-text">💕</div>
            </div>
            <div class="balloon balloon-4" onclick="showMessage(4)">
                <div class="balloon-text">🎀</div>
            </div>
            <div class="balloon balloon-5" onclick="showMessage(5)">
                <div class="balloon-text">✨</div>
            </div>
        </div>

        <div id="messageBox" class="message-box">
            <p id="messageText"></p>
            <button onclick="closeMessage()">Close</button>
        </div>

        <div class="navigation">
            <button onclick="goToPage(1)" class="nav-btn">← Back</button>
            <button onclick="goToPage(3)" class="nav-btn">Next →</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
