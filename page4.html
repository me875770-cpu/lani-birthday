<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Your Gift - Birthday Surprise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-4">
        <div class="gift-container">
            <h1>Pick Your Gift</h1>
            <div class="gifts-grid">
                <div class="gift-option" onclick="selectGift(1)">
                    <div class="gift-card">
                        <div class="gift-emoji">🎁</div>
                        <p>10 Minutes of My Time</p>
                    </div>
                </div>
                <div class="gift-option" onclick="selectGift(2)">
                    <div class="gift-card">
                        <div class="gift-emoji">🎮</div>
                        <p>Play PUBG As You Want</p>
                    </div>
                </div>
                <div class="gift-option" onclick="selectGift(3)">
                    <div class="gift-card">
                        <div class="gift-emoji">💝</div>
                        <p>Do Whatever You Ask</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="giftMessage" class="gift-message">
            <p id="giftText"></p>
            <button onclick="closeGiftMessage()">Close</button>
        </div>

        <div class="navigation">
            <button onclick="goToPage(3)" class="nav-btn">← Back</button>
            <button onclick="goToPage(5)" class="nav-btn">Next →</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
